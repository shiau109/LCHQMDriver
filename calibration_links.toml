# Configuration for vendoring official calibration files into this repo.
# Consumed by sync_official.py, which COPIES (not symlinks) these files so the
# repo stays self-contained and upstream updates show up as reviewable git diffs.
# Edit this file to add/remove sources - no need to modify the Python script.

# Base source directory (common prefix for all targets).
# Use forward slashes (/) for cross-platform compatibility.
# Override at runtime with the QUA_LIBS_OFFICIAL environment variable, which
# takes precedence over this value (handy on machines with a different layout).
source_base = "D:/github/qua-libs_official/qualibration_graphs/superconducting"

# ----------------------------------------------------------------------------
# Source folders for calibrations (files)
# All .py files in these folders are copied into local calibrations/
# Paths are relative to source_base
# ----------------------------------------------------------------------------
calibrations_source = [
    "calibrations/CZ_calibration_fixed_couplers",
    "calibrations/1Q_calibrations"
]

# ----------------------------------------------------------------------------
# Source folders for calibration_utils (directories)
# All subfolders in these folders are mirrored into local calibration_utils/
# Paths are relative to source_base
# ----------------------------------------------------------------------------
calibration_utils_source = [
    "calibration_utils",
    # "another_utils_folder",
]
